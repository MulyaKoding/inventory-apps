name: marketplace_inventory
description: "Aplikasi Inventory Marketplace dengan Flutter dan MongoDB"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Environment variables
  flutter_dotenv: ^5.2.1

  # UI & Material Design
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296

  # State Management (Optional - untuk nanti)
  provider: ^6.0.0

  # Database
  mongo_dart: ^0.10.9

  # Networking
  http: ^1.1.0
  dio: ^5.3.1

  # JSON Serialization
  json_annotation: ^4.8.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3

  # Date & Time
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - .env

  # Uncomment and add your fonts here
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700